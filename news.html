<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeOS · News</title>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://notion-proxy.churan756.workers.dev https://content.guardianapis.com https://gnews.io https://api.marketaux.com; frame-ancestors 'none';">
<link rel="icon" href="data:,">
<link rel="stylesheet" href="core/style.css">
<style>
.cd-bar { background:var(--s2); border-bottom:1px solid var(--b2); padding:8px 20px; display:flex; align-items:center; gap:12px; font-family:var(--ff); }
.cd-label { font-size:.42rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
.cd-event { font-size:.48rem; color:var(--t2); }
.cd-timer { font-size:.9rem; font-weight:700; color:var(--blue); font-variant-numeric:tabular-nums; font-family:var(--fd); margin-left:auto; }
.tab-bar { display:flex; gap:4px; padding:12px 20px 0; border-bottom:1px solid var(--b2); flex-wrap:wrap; }
.tab-btn { padding:6px 16px; border-radius:5px 5px 0 0; border:1px solid transparent; cursor:pointer; font-size:.44rem; color:var(--muted); background:none; font-family:var(--ff); letter-spacing:.5px; transition:all .15s; }
.tab-btn.active { background:var(--s2); border-color:var(--b2); border-bottom-color:var(--s2); color:var(--text); font-weight:700; }
.filter-bar { display:flex; gap:6px; padding:10px 20px; flex-wrap:wrap; align-items:center; border-bottom:1px solid var(--b2); }
.filter-bar label { font-size:.4rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px; font-family:var(--ff); }
.chip { padding:3px 10px; border-radius:3px; border:1px solid var(--b2); background:var(--s3); color:var(--muted); cursor:pointer; font-size:.42rem; font-family:var(--ff); letter-spacing:.5px; transition:all .12s; }
.chip.active { border-color:var(--blue); color:var(--blue); background:rgba(61,142,255,.08); }
.chip.c-red.active   { border-color:var(--red);   color:var(--red);   background:rgba(255,45,85,.08); }
.chip.c-amb.active   { border-color:var(--amber); color:var(--amber); background:rgba(245,166,35,.08); }
.chip.c-grn.active   { border-color:var(--green); color:var(--green); background:rgba(0,212,122,.08); }
.sep { width:1px; height:16px; background:var(--b2); margin:0 2px; }
.day-group { margin:12px 20px; }
.day-hdr { font-size:.42rem; color:var(--muted); text-transform:uppercase; letter-spacing:1.5px; padding:6px 0; border-bottom:1px solid var(--b2); margin-bottom:6px; display:flex; justify-content:space-between; font-family:var(--ff); }
.ev-row { background:var(--s2); border:1px solid var(--b2); border-radius:6px; margin-bottom:4px; overflow:hidden; transition:border-color .12s; }
.ev-row:hover { border-color:var(--b3); }
.ev-hdr { display:grid; grid-template-columns:68px 22px 1fr 60px 72px 72px 24px; gap:8px; align-items:center; padding:9px 12px; cursor:pointer; }
.ev-time { font-size:.42rem; color:var(--muted); font-family:var(--ff); font-variant-numeric:tabular-nums; }
.impact-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.dot-high { background:var(--red); box-shadow:0 0 5px var(--red); }
.dot-med  { background:var(--amber); }
.dot-low  { background:var(--green); }
.ev-name { font-size:.5rem; font-weight:600; font-family:var(--ff); color:var(--text); }
.ev-ccy { font-size:.4rem; color:var(--muted); background:var(--s3); padding:2px 6px; border-radius:3px; text-align:center; font-family:var(--ff); }
.ev-col { font-size:.46rem; font-weight:600; text-align:right; font-family:var(--ff); }
.ev-col.pending { color:var(--muted); font-size:.4rem; }
.ev-chevron { font-size:.5rem; color:var(--muted); text-align:right; transition:transform .2s; }
.ev-row.open .ev-chevron { transform:rotate(180deg); }
.ev-hist { display:none; padding:12px 14px; background:var(--s3); border-top:1px solid var(--b2); }
.ev-row.open .ev-hist { display:block; }
.hist-label { font-size:.4rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; font-family:var(--ff); }
.hist-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:6px; }
.hist-item { background:var(--s2); border:1px solid var(--b2); border-radius:5px; padding:8px 10px; }
.hi-date { font-size:.38rem; color:var(--muted); font-family:var(--ff); margin-bottom:3px; }
.hi-val { font-size:.85rem; font-weight:800; font-family:var(--fd); }
.hi-prev { font-size:.38rem; color:var(--muted); font-family:var(--ff); margin-top:2px; }
.hi-up { color:var(--green); } .hi-dn { color:var(--red); }
.hist-loading { font-size:.44rem; color:var(--muted); font-family:var(--ff); animation:pulse 1.5s infinite; }
.hist-err { font-size:.44rem; color:var(--red); font-family:var(--ff); }

/* ── NEWS FEED ── */
.news-topbar { display:flex; align-items:center; justify-content:space-between; padding:10px 20px; border-bottom:1px solid var(--b2); gap:8px; flex-wrap:wrap; }
.news-stat { font-size:.4rem; color:var(--muted); font-family:var(--ff); }
.news-stat strong { color:var(--text); }
.news-actions { display:flex; gap:6px; }
.act-btn { padding:4px 14px; border-radius:4px; border:1px solid var(--b2); background:var(--s3); color:var(--t2); font-size:.4rem; font-family:var(--ff); cursor:pointer; transition:all .12s; }
.act-btn:hover { border-color:var(--blue); color:var(--blue); }
.act-btn.primary { background:var(--blue); color:#fff; border-color:var(--blue); }
.act-btn.primary:hover { opacity:.85; }

/* API key notice */
.api-notice { margin:12px 20px; padding:10px 14px; border-radius:6px; font-size:.42rem; font-family:var(--ff); line-height:1.8; border:1px solid rgba(61,142,255,.25); background:rgba(61,142,255,.06); color:var(--t2); }
.api-notice strong { color:var(--blue); }
.api-notice input { background:var(--s3); border:1px solid var(--b2); border-radius:4px; color:var(--text); padding:4px 10px; font-size:.44rem; font-family:var(--ff); width:260px; margin:0 6px; }
.api-notice input:focus { outline:none; border-color:var(--blue); }
.api-notice button { padding:4px 12px; border-radius:4px; border:1px solid var(--blue); background:var(--blue); color:#fff; font-size:.42rem; font-family:var(--ff); cursor:pointer; }

.news-grid { padding:12px 20px; display:flex; flex-direction:column; gap:8px; }

/* Article card */
.news-card { background:var(--s2); border:1px solid var(--b2); border-radius:6px; padding:14px; display:flex; gap:12px; align-items:flex-start; transition:border-color .12s; }
.news-card:hover { border-color:var(--b3); }
.news-card.imp-high   { border-left:3px solid var(--red); }
.news-card.imp-medium { border-left:3px solid var(--amber); }
.news-card.imp-low    { border-left:3px solid var(--muted); }

.news-score { flex-shrink:0; width:38px; height:38px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-family:var(--fd); font-weight:800; font-size:.75rem; }
.sc-high   { background:rgba(255,45,85,.12);  color:var(--red); }
.sc-medium { background:rgba(245,166,35,.12); color:var(--amber); }
.sc-low    { background:rgba(55,74,96,.3);    color:var(--muted); }

.news-body { flex:1; min-width:0; }
.news-meta-row { display:flex; align-items:center; gap:8px; margin-bottom:5px; flex-wrap:wrap; }
.news-src  { font-size:.38rem; color:var(--muted); font-family:var(--ff); text-transform:uppercase; letter-spacing:.5px; }
.news-time { font-size:.38rem; color:var(--muted); font-family:var(--ff); }
.ntag { font-size:.35rem; padding:1px 7px; border-radius:2px; font-family:var(--ff); font-weight:700; border:1px solid; letter-spacing:.4px; }
.ntag-GOLD     { color:#f5a623; border-color:rgba(245,166,35,.3); background:rgba(245,166,35,.06); }
.ntag-FED      { color:var(--blue);   border-color:rgba(61,142,255,.3);  background:rgba(61,142,255,.06); }
.ntag-OIL      { color:var(--cyan);   border-color:rgba(0,196,245,.3);   background:rgba(0,196,245,.06); }
.ntag-YIELDS   { color:var(--purple); border-color:rgba(155,107,255,.3); background:rgba(155,107,255,.06); }
.ntag-GEO      { color:var(--red);    border-color:rgba(255,45,85,.3);   background:rgba(255,45,85,.06); }
.ntag-TRADE    { color:var(--green);  border-color:rgba(0,212,122,.3);   background:rgba(0,212,122,.06); }
.ntag-CURRENCY { color:#9b6bff;       border-color:rgba(155,107,255,.3); background:rgba(155,107,255,.06); }
.ntag-MACRO    { color:var(--muted);  border-color:var(--b2);            background:transparent; }
.news-title { font-size:.52rem; font-weight:600; font-family:var(--ff); color:var(--text); margin-bottom:5px; line-height:1.5; }
.news-title a { color:inherit; text-decoration:none; }
.news-title a:hover { color:var(--blue); }
.news-why { font-size:.42rem; color:var(--t2); font-family:var(--ff); line-height:1.6; margin-bottom:6px; }
.news-pills { display:flex; gap:6px; flex-wrap:wrap; }
.npill { font-size:.36rem; padding:2px 8px; border-radius:3px; font-family:var(--ff); font-weight:700; border:1px solid; }
.npill-bull  { color:var(--green); border-color:rgba(0,212,122,.3);  background:rgba(0,212,122,.06); }
.npill-bear  { color:var(--red);   border-color:rgba(255,45,85,.3);  background:rgba(255,45,85,.06); }
.npill-watch { color:var(--amber); border-color:rgba(245,166,35,.3); background:rgba(245,166,35,.06); }
.npill-neut  { color:var(--muted); border-color:var(--b2);           background:transparent; }

/* ── DATA LINKS TAB ── */
.data-links-wrap { padding:16px 20px; display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:12px; }
.dl-section { background:var(--s2); border:1px solid var(--b2); border-radius:8px; overflow:hidden; }
.dl-section-hdr { padding:10px 14px; border-bottom:1px solid var(--b2); font-size:.42rem; font-weight:700; font-family:var(--ff); color:var(--text); display:flex; align-items:center; gap:8px; }
.dl-section-hdr .hdr-icon { font-size:.6rem; }
.dl-row { display:flex; align-items:center; justify-content:space-between; padding:9px 14px; border-bottom:1px solid var(--b2); gap:10px; }
.dl-row:last-child { border-bottom:none; }
.dl-info { flex:1; }
.dl-name { font-size:.46rem; font-family:var(--ff); color:var(--text); margin-bottom:2px; }
.dl-sub  { font-size:.38rem; color:var(--muted); font-family:var(--ff); line-height:1.5; }
.dl-freq { font-size:.34rem; padding:1px 7px; border-radius:2px; border:1px solid var(--b2); color:var(--muted); font-family:var(--ff); white-space:nowrap; margin-right:6px; }
.dl-open { padding:4px 12px; border-radius:4px; border:1px solid var(--b2); background:var(--s3); color:var(--t2); font-size:.38rem; font-family:var(--ff); cursor:pointer; text-decoration:none; display:inline-block; white-space:nowrap; transition:all .12s; }
.dl-open:hover { border-color:var(--blue); color:var(--blue); }
.dl-open.primary-link { border-color:var(--amber); color:var(--amber); background:rgba(245,166,35,.06); }
.dl-open.primary-link:hover { background:rgba(245,166,35,.12); }

.news-loading { padding:40px 20px; text-align:center; font-size:.5rem; color:var(--muted); font-family:var(--ff); animation:pulse 1.5s infinite; }
.news-err { padding:20px; font-size:.44rem; color:var(--red); font-family:var(--ff); line-height:1.8; background:var(--s3); border-radius:6px; margin:12px 20px; }
.empty { padding:32px 20px; text-align:center; font-size:.5rem; color:var(--muted); font-family:var(--ff); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
</style>

  <div class="sep"></div>

  <button class="chip active" id="cat-ALL"      onclick="setNFCat('ALL',this)">ALL</button>
  <button class="chip"        id="cat-GOLD"     onclick="setNFCat('GOLD',this)">GOLD</button>
  <button class="chip"        id="cat-FED"      onclick="setNFCat('FED',this)">FED</button>
  <button class="chip"        id="cat-OIL"      onclick="setNFCat('OIL',this)">OIL</button>
  <button class="chip"        id="cat-YIELDS"   onclick="setNFCat('YIELDS',this)">YIELDS</button>
  <button class="chip"        id="cat-GEO"      onclick="setNFCat('GEO',this)">GEO</button>
  <button class="chip"        id="cat-TRADE"    onclick="setNFCat('TRADE',this)">TRADE</button>
</div>
<div id="calContent"></div>
<div id="newsContent" style="display:none;"></div>
<div id="dataContent" style="display:none;"></div>
<div id="price-strip">
  <div class="ps-pair" id="ps-eur"><span class="ps-sym">EUR/USD</span><span class="ps-price">—</span><span class="ps-chg"></span></div>
  <div class="ps-pair" id="ps-gbp"><span class="ps-sym">GBP/USD</span><span class="ps-price">—</span><span class="ps-chg"></span></div>
  <div class="ps-pair" id="ps-nas"><span class="ps-sym">NAS100</span><span class="ps-price">—</span><span class="ps-chg"></span></div>
  <div class="ps-pair" id="ps-spx"><span class="ps-sym">SPX500</span><span class="ps-price">—</span><span class="ps-chg"></span></div>
  <div class="strip-right"><span class="strip-ts" id="strip-ts"></span><span class="strip-src" id="strip-src">○ Loading</span></div>
</div>
<script src="core/security.js"></script>
<script src="core/config.js"></script>
<script src="core/state.js"></script>
<script src="core/api.js"></script>
<script src="core/engines.js"></script>
<script>
const PAGE_ID = 'news';

// ─────────────────────────────────────────────────────────
// NEWS SCORING ENGINE
// Each rule: keywords → score, tag, gold effect
// ─────────────────────────────────────────────────────────
const RULES = [
  { kw:['gold price','xauusd','spot gold','gold futures','gold rally','gold drops','gold surge','gold record','gold all-time'], score:10, tag:'GOLD', ge:'watch' },
  { kw:['federal reserve','fed rate','fomc','jerome powell','rate hike','rate cut','fed decision','monetary policy','fed funds','quantitative tightening','quantitative easing','balance sheet'], score:10, tag:'FED', ge:'watch' },
  { kw:['cpi','inflation data','inflation report','consumer price index','core inflation','pce','ppi','producer price'], score:9, tag:'FED', ge:'bull' },
  { kw:['treasury yield','bond yield','10-year','10 year yield','yield curve','real yield','tips','us bonds','bond market'], score:8, tag:'YIELDS', ge:'bear' },
  { kw:['crude oil','brent crude','wti','oil price','opec','energy supply','oil supply','oil demand','oil sanctions','natural gas'], score:8, tag:'OIL', ge:'watch' },
  { kw:['dollar index','dxy','dollar strength','dollar weakens','dollar falls','dollar rallies','de-dollarization','dollar dominance','reserve currency','usd'], score:8, tag:'CURRENCY', ge:'bear' },
  { kw:['tariff','trade war','trade dispute','sanctions','export controls','import duty','trade deficit','semiconductor ban','chip restriction','trade deal'], score:8, tag:'TRADE', ge:'bull' },
  { kw:['war','military strike','nuclear','missile','iran nuclear','russia ukraine','nato','middle east tensions','israel','hamas','hezbollah','taiwan strait','south china sea','brics'], score:7, tag:'GEO', ge:'bull' },
  { kw:['central bank','gold reserves','foreign reserves','ecb','bank of japan','pboc','reserve bank','rate decision','stimulus','gold buying'], score:7, tag:'FED', ge:'watch' },
  { kw:['nonfarm payroll','unemployment rate','jobs report','gdp growth','recession','economic slowdown','labour market'], score:6, tag:'MACRO', ge:'watch' },
  { kw:['market selloff','vix spike','risk off','safe haven','flight to safety','bank crisis','financial crisis','credit crisis','market crash'], score:6, tag:'MACRO', ge:'bull' },
  { kw:['inflation expectations','breakeven rate','precious metals','silver price','platinum','palladium','commodity prices'], score:4, tag:'GOLD', ge:'watch' },
];

const MIN_SHOW = 4, MIN_HIGH = 8, MIN_MED = 5;

// ─────────────────────────────────────────────────────────
// GUARDIAN API — completely free, no API key limit, CORS-open
// Use test key for low volume. For production get free key at open-platform.theguardian.com
// ─────────────────────────────────────────────────────────
let GUARDIAN_KEY = (typeof ApiKeyStore !== 'undefined' ? ApiKeyStore.guardian() : '') || localStorage.getItem('guardian-key') || 'test';
const GUARDIAN_QUERIES = [
  'gold price federal reserve',
  'oil price opec inflation',
  'trade war tariffs sanctions',
  'bond yield dollar treasury',
  'geopolitical risk war conflict',
  'central bank interest rate',
];

// ─────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────
let allArticles = [];
let newsLoaded = false;
let nfImpact = ['high','medium','low'];
let nfCat = 'ALL';
let activeTab = 'week';
let ccyFilter = 'ALL';
let impactFilter = ['HIGH','MED','LOW'];
let histCache = {};

// ─────────────────────────────────────────────────────────
// TAB SWITCH
// ─────────────────────────────────────────────────────────
function switchTab(tab, el) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  const cal = document.getElementById('calContent');
  const nc  = document.getElementById('newsContent');
  const dc  = document.getElementById('dataContent');
  const calF = document.getElementById('calFilters');
  const nF   = document.getElementById('newsFilters');
  cal.style.display='none'; nc.style.display='none'; dc.style.display='none';
  calF.style.display='none'; nF.style.display='none';
  if (tab==='news') {
    nc.style.display='block'; nF.style.display='flex';
    if (!newsLoaded) loadNews();
  } else if (tab==='data') {
    dc.style.display='block'; renderDataLinks();
  } else {
    cal.style.display='block'; calF.style.display='flex'; renderCalendar();
  }
}

// ─────────────────────────────────────────────────────────
// LOAD NEWS — Guardian API primary, fallback message
// ─────────────────────────────────────────────────────────
async function loadNews() {
  const nc = document.getElementById('newsContent');
  nc.innerHTML = `<div class="news-topbar"><div class="news-stat">Fetching from The Guardian…</div></div><div class="news-loading">Loading market news…</div>`;

  const results = [];
  const seen = new Set();

  // Fetch multiple search queries from Guardian
  for (const q of GUARDIAN_QUERIES) {
    try {
      const url = `https://content.guardianapis.com/search?q=${encodeURIComponent(q)}&section=business|money|world&show-fields=headline,trailText,webPublicationDate&page-size=15&order-by=newest&api-key=${GUARDIAN_KEY}`;
      const res = await fetch(url, { signal: AbortSignal.timeout(8000) });
      if (!res.ok) continue;
      const data = await res.json();
      const items = data?.response?.results || [];
      items.forEach(item => {
        const key = (item.webTitle||'').toLowerCase().slice(0,50);
        if (seen.has(key)) return;
        seen.add(key);
        const scored = scoreItem({
          title: item.webTitle,
          description: item.fields?.trailText || '',
          link: item.webUrl,
          pubDate: item.webPublicationDate,
          source: 'The Guardian'
        });
        if (scored.score >= MIN_SHOW) results.push(scored);
      });
    } catch(e) { console.warn('Guardian query failed:', q, e.message); }
  }

  if (!results.length) {
    // Show helpful error with setup instructions
    nc.innerHTML = `
      <div class="news-topbar">
        <div class="news-stat">News unavailable</div>
        <div class="news-actions">
          <button class="act-btn" onclick="loadNews()">⟳ RETRY</button>
        </div>
      </div>
      <div class="api-notice">
        <strong>Setup Required for Live News:</strong><br><br>
        The Guardian API is free and requires a one-time API key registration:<br>
        1. Go to <strong>open-platform.theguardian.com/access</strong><br>
        2. Click "Register for a developer key" — completely free<br>
        3. You'll receive your key by email instantly<br>
        4. Enter your key below and click Save:<br><br>
        <input type="text" id="guardianKeyInput" placeholder="Enter your Guardian API key here" value="${GUARDIAN_KEY==='test'?'':GUARDIAN_KEY}">
        <button onclick="saveGuardianKey()">Save Key</button>

        <strong>Alternative:</strong> The "test" key works but is rate-limited. If you're getting no results, register your free key above.
        <br><br>
        While waiting, use the <strong>DATA LINKS</strong> tab for direct access to COT, Gold flows, and market data sources.
      </div>`;
    return;
  }

  // Sort by score desc, then date desc
  results.sort((a,b) => b.score - a.score || new Date(b.pubDate) - new Date(a.pubDate));
  allArticles = results;
  newsLoaded = true;
  renderNews();
}

// ─────────────────────────────────────────────────────────
// SCORE ITEM
// ─────────────────────────────────────────────────────────
function scoreItem(item) {
  const text = ((item.title||'')+(item.description||'')).toLowerCase();
  let score = 0;
  let tags = new Set();
  let goldEffects = new Set();
  let primaryTag = 'MACRO';
  let topScore = 0;

  RULES.forEach(r => {
    if (r.kw.some(k => text.includes(k))) {
      score += r.score;
      tags.add(r.tag);
      goldEffects.add(r.ge);
      if (r.score > topScore) { topScore=r.score; primaryTag=r.tag; }
    }
  });

  let impact = 'low';
  if (score >= MIN_HIGH) impact = 'high';
  else if (score >= MIN_MED) impact = 'medium';

  let ge = 'watch';
  if (goldEffects.has('bull') && !goldEffects.has('bear')) ge = 'bull';
  else if (goldEffects.has('bear') && !goldEffects.has('bull')) ge = 'bear';

  const why = buildWhy([...tags], score);

  return { ...item, score, impact, tags:[...tags].slice(0,3), primaryTag, goldEffect:ge, why };
}

function buildWhy(tags, score) {
  const parts = [];
  if (score >= 15) parts.push('⚡ Critical market mover');
  else if (score >= 10) parts.push('High impact event');
  if (tags.includes('GOLD'))     parts.push('Direct Gold price driver');
  if (tags.includes('FED'))      parts.push('Fed policy → real yields → Gold inverse');
  if (tags.includes('YIELDS'))   parts.push('Yield change = primary Gold driver');
  if (tags.includes('OIL'))      parts.push('Oil → inflation → Gold demand');
  if (tags.includes('GEO'))      parts.push('Risk-off → safe haven Gold demand');
  if (tags.includes('TRADE'))    parts.push('Dollar uncertainty → Gold hedge');
  if (tags.includes('CURRENCY')) parts.push('Dollar move → inverse Gold reaction');
  return parts.slice(0,2).join(' · ') || 'Monitor for market implications';
}

function renderNews() {
  const nc = document.getElementById('newsContent');
  let filtered = allArticles;
  if (!nfImpact.includes('high'))   filtered = filtered.filter(a=>a.impact!=='high');
  if (!nfImpact.includes('medium')) filtered = filtered.filter(a=>a.impact!=='medium');
  if (!nfImpact.includes('low'))    filtered = filtered.filter(a=>a.impact==='high'||a.impact==='medium');
  if (nfCat !== 'ALL') filtered = filtered.filter(a=>a.tags.includes(nfCat)||a.primaryTag===nfCat);

  const hc = allArticles.filter(a=>a.impact==='high').length;
  const mc = allArticles.filter(a=>a.impact==='medium').length;

  if (!filtered.length) {
    nc.innerHTML = `
      <div class="news-topbar">
        <div class="news-stat">No articles match filters</div>
        <div class="news-actions"><button class="act-btn" onclick="refreshNews()">⟳ REFRESH</button></div>
      </div>
      <div class="empty">Try adjusting filters above.</div>`;
    return;
  }

  nc.innerHTML = `
    <div class="news-topbar">
      <div class="news-stat">
        <strong>${filtered.length}</strong> articles shown &nbsp;·&nbsp;
        <strong style="color:var(--red)">${hc}</strong> high impact &nbsp;·&nbsp;
        <strong style="color:var(--amber)">${mc}</strong> medium &nbsp;·&nbsp;
        Total: ${allArticles.length}
      </div>
      <div class="news-actions">
        <button class="act-btn" onclick="refreshNews()">⟳ REFRESH</button>
      </div>
    </div>
    <div class="news-grid">${filtered.map(buildCard).join('')}</div>`;
}

function buildCard(a) {
  const scCls = a.impact==='high'?'sc-high':a.impact==='medium'?'sc-medium':'sc-low';
  const cardCls = `news-card imp-${a.impact}`;
  const tagHtml = a.tags.map(t=>`<span class="ntag ntag-${t}">${t}</span>`).join('');
  const gePill = a.goldEffect==='bull'
    ? '<span class="npill npill-bull">GOLD ↑ BULLISH</span>'
    : a.goldEffect==='bear'
    ? '<span class="npill npill-bear">GOLD ↓ BEARISH</span>'
    : '<span class="npill npill-watch">GOLD ⚡ WATCH</span>';
  const timeStr = a.pubDate ? timeAgo(new Date(a.pubDate)) : '—';
  return `<div class="${cardCls}">
    <div class="news-score ${scCls}">${a.score}</div>
    <div class="news-body">
      <div class="news-meta-row">
        <span class="news-src">${esc(a.source)}</span>
        <span class="news-time">${timeStr}</span>
        ${tagHtml}
      </div>
      <div class="news-title"><a href="${escUrl(a.link)}" target="_blank" rel="noopener">${esc(a.title)}</a></div>
      <div class="news-why">${esc(a.why)}</div>
      <div class="news-pills">${gePill}<span class="npill npill-neut">${esc(a.source)}</span></div>
    </div>
  </div>`;
}

function refreshNews() { newsLoaded=false; allArticles=[]; loadNews(); }

// ─────────────────────────────────────────────────────────
// CALENDAR (unchanged)
// ─────────────────────────────────────────────────────────
function nowIST() { return new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Kolkata'})); }
function getWeekRange(offset) {
  const now=nowIST(),day=now.getDay();
  const mon=new Date(now); mon.setDate(now.getDate()-(day===0?6:day-1)+offset*7); mon.setHours(0,0,0,0);
  const fri=new Date(mon); fri.setDate(mon.getDate()+6); fri.setHours(23,59,59,999);
  return {start:mon,end:fri};
}
const CAL = [
  {name:'CPI y/y',currency:'USD',impact:'HIGH',series:'CPIAUCSL',dom:10,h:8,m:30},
  {name:'Core CPI y/y',currency:'USD',impact:'HIGH',series:'CPILFESL',dom:10,h:8,m:30},
  {name:'NFP',currency:'USD',impact:'HIGH',series:'PAYEMS',dom:4,h:8,m:30},
  {name:'Unemployment Rate',currency:'USD',impact:'HIGH',series:'UNRATE',dom:4,h:8,m:30},
  {name:'GDP QoQ',currency:'USD',impact:'HIGH',series:'A191RL1Q225SBEA',dom:28,h:8,m:30},
  {name:'FOMC Rate Decision',currency:'USD',impact:'HIGH',series:'FEDFUNDS',dom:1,h:14,m:0},
  {name:'FOMC Minutes',currency:'USD',impact:'HIGH',series:'',dom:8,h:14,m:0},
  {name:'PPI m/m',currency:'USD',impact:'MED',series:'',dom:11,h:8,m:30},
  {name:'Retail Sales m/m',currency:'USD',impact:'MED',series:'',dom:16,h:8,m:30},
  {name:'ISM Manufacturing PMI',currency:'USD',impact:'MED',series:'',dom:1,h:10,m:0},
  {name:'Consumer Confidence',currency:'USD',impact:'MED',series:'',dom:25,h:10,m:0},
  {name:'ECB Rate Decision',currency:'EUR',impact:'HIGH',series:'',dom:11,h:13,m:15},
  {name:'UK CPI y/y',currency:'GBP',impact:'HIGH',series:'',dom:15,h:7,m:0},
  {name:'BoE Rate Decision',currency:'GBP',impact:'HIGH',series:'',dom:8,h:12,m:0},
];
function buildEvents(start,end) {
  const evs=[];
  let cur=new Date(start);
  while(cur<=end){
    const y=cur.getFullYear(),mo=cur.getMonth();
    CAL.forEach(ev=>{
      const d=new Date(y,mo,ev.dom,ev.h,ev.m,0);
      if(d>=start&&d<=end){
        const key=`${ev.name.replace(/\s/g,'_')}_${y}_${mo}`;
        evs.push({...ev,date:d,dateStr:d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}),timeStr:d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Kolkata'})+' IST',key});
      }
    });
    cur.setDate(cur.getDate()+1);
  }
  return evs.sort((a,b)=>a.date-b.date);
}
function renderCalendar(){
  let evs=[];
  if(activeTab==='week'){const r=getWeekRange(0);evs=buildEvents(r.start,r.end);}
  else if(activeTab==='next'){const r=getWeekRange(1);evs=buildEvents(r.start,r.end);}
  else{const r1=getWeekRange(2),r2=getWeekRange(9);evs=buildEvents(r1.start,r2.end);}
  evs=evs.filter(e=>(ccyFilter==='ALL'||e.currency===ccyFilter)&&impactFilter.includes(e.impact));
  const con=document.getElementById('calContent');
  if(!evs.length){con.innerHTML='<div class="empty">No events match filters.</div>';return;}
  const byDay={};
  evs.forEach(e=>{if(!byDay[e.dateStr])byDay[e.dateStr]=[];byDay[e.dateStr].push(e);});
  con.innerHTML=Object.entries(byDay).map(([day,de])=>`
    <div class="day-group">
      <div class="day-hdr"><span>${day}</span><span>${de.filter(e=>e.impact==='HIGH').length} HIGH IMPACT</span></div>
      ${de.map(renderEvRow).join('')}
    </div>`).join('');
}
function renderEvRow(e){
  const dc={HIGH:'dot-high',MED:'dot-med',LOW:'dot-low'}[e.impact]||'dot-low';
  return `<div class="ev-row" id="ev-${e.key}" onclick="toggleEv('${e.key}','${e.series||''}')">
    <div class="ev-hdr">
      <div class="ev-time">${e.timeStr}</div>
      <div class="impact-dot ${dc}"></div>
      <div class="ev-name">${e.name}</div>
      <div class="ev-ccy">${e.currency}</div>
      <div class="ev-col pending">—</div>
      <div class="ev-col pending">Pending</div>
      <div class="ev-chevron">▾</div>
    </div>
    <div class="ev-hist" id="hist-${e.key}">
      <div class="hist-label">Historical Releases ${e.series?'(FRED Data)':'(No FRED series)'}</div>
      <div id="hi-${e.key}">${e.series?'<div class="hist-loading">Loading…</div>':'<div class="hist-err">Check Macro tab for this data.</div>'}</div>
    </div>
  </div>`;
}
async function toggleEv(key,series){
  const row=document.getElementById(`ev-${key}`);
  const isOpen=row.classList.contains('open');
  document.querySelectorAll('.ev-row.open').forEach(r=>r.classList.remove('open'));
  if(isOpen) return;
  row.classList.add('open');
  if(!series) return;
  const inner=document.getElementById(`hi-${key}`);
  if(histCache[series]){renderHist(inner,histCache[series],series);return;}
  inner.innerHTML='<div class="hist-loading">Fetching FRED…</div>';
  try{
    const res=await API.fred(series);
    const obs=(res.observations||[]).filter(o=>o.value!=='.'&&o.value!=='').sort((a,b)=>b.date.localeCompare(a.date)).slice(0,12);
    histCache[series]=obs;
    renderHist(inner,obs,series);
  }catch(e){inner.innerHTML=`<div class="hist-err">⚠ ${e.message}</div>`;}
}
function renderHist(con,obs,series){
  if(!obs.length){con.innerHTML='<div class="hist-err">No data.</div>';return;}
  const isYoY=['CPIAUCSL','CPILFESL'].includes(series);
  const isMoM=series==='PAYEMS';
  const sorted=[...obs].sort((a,b)=>a.date.localeCompare(b.date));
  const rev=[...sorted].reverse();
  con.innerHTML='<div class="hist-grid">'+rev.map((o,i)=>{
    const raw=parseFloat(o.value),prev=rev[i+1]?parseFloat(rev[i+1].value):null;
    let d,unit='';
    if(isYoY){const idx=sorted.findIndex(s=>s.date===o.date),p12=sorted[idx-12];d=p12?+((raw-parseFloat(p12.value))/parseFloat(p12.value)*100).toFixed(2):raw;unit='%';}
    else if(isMoM){d=prev!==null?+(raw-prev).toFixed(1):raw;unit='K';}
    else d=raw;
    const chg=d!==null&&prev!==null?d-prev:null;
    const cls=chg>0?'hi-up':chg<0?'hi-dn':'';
    return `<div class="hist-item">
      <div class="hi-date">${o.date}</div>
      <div class="hi-val ${d>0?'hi-up':d<0?'hi-dn':''}">${d!=null?d.toFixed(2)+unit:'—'}</div>
      <div class="hi-prev ${cls}">Prev: ${prev!=null?prev.toFixed(2)+unit:'—'}</div>
    </div>`;
  }).join('')+'</div>';
}
function setCcy(ccy,el){ccyFilter=ccy;document.querySelectorAll('#calFilters .chip').forEach(c=>{if(['ALL','USD','EUR','GBP'].includes(c.textContent))c.classList.remove('active');});el.classList.add('active');renderCalendar();}
function toggleImpact(level,el){if(impactFilter.includes(level)){impactFilter=impactFilter.filter(i=>i!==level);el.classList.remove('active');}else{impactFilter.push(level);el.classList.add('active');}renderCalendar();}
function updateCountdown(){
  const now=nowIST(),r1=getWeekRange(0),r2=getWeekRange(4);
  const evs=buildEvents(r1.start,r2.end).filter(e=>e.impact==='HIGH'&&e.date>now);
  if(!evs.length){document.getElementById('cdTimer').textContent='—';return;}
  const next=evs[0];
  document.getElementById('cdEvent').textContent=next.name;
  const diff=next.date-now;
  const h=Math.floor(diff/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);
  document.getElementById('cdTimer').textContent=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

// ─────────────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escUrl(u){try{const p=new URL(u);return(p.protocol==='http:'||p.protocol==='https:')?u:'#';}catch{return'#';}}
function timeAgo(d){const s=(Date.now()-d)/1000;if(s<60)return'just now';if(s<3600)return`${Math.floor(s/60)}m ago`;if(s<86400)return`${Math.floor(s/3600)}h ago`;return`${Math.floor(s/86400)}d ago`;}
