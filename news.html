<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeOS · News</title>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://notion-proxy.churan756.workers.dev https://api.rss2json.com; frame-ancestors 'none';">
<link rel="icon" href="data:,">
<link rel="stylesheet" href="core/style.css">
<style>
/* ── Countdown ── */
.cd-bar { background: var(--s2); border-bottom: 1px solid var(--b2); padding: 8px 20px; display: flex; align-items: center; gap: 12px; font-family: var(--ff); }
.cd-label { font-size: .42rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
.cd-event { font-size: .48rem; color: var(--t2); }
.cd-timer { font-size: .9rem; font-weight: 700; color: var(--blue); font-variant-numeric: tabular-nums; font-family: var(--fd); margin-left: auto; }

/* ── Tabs ── */
.tab-bar { display: flex; gap: 4px; padding: 12px 20px 0; border-bottom: 1px solid var(--b2); flex-wrap: wrap; }
.tab-btn { padding: 6px 16px; border-radius: 5px 5px 0 0; border: 1px solid transparent; cursor: pointer; font-size: .44rem; color: var(--muted); background: none; font-family: var(--ff); letter-spacing: .5px; transition: all .15s; }
.tab-btn.active { background: var(--s2); border-color: var(--b2); border-bottom-color: var(--s2); color: var(--text); font-weight: 700; }

/* ── Filter bars ── */
.filter-bar { display: flex; gap: 6px; padding: 10px 20px; flex-wrap: wrap; align-items: center; border-bottom: 1px solid var(--b2); }
.filter-bar label { font-size: .4rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-family: var(--ff); }
.chip { padding: 3px 10px; border-radius: 3px; border: 1px solid var(--b2); background: var(--s3); color: var(--muted); cursor: pointer; font-size: .42rem; font-family: var(--ff); letter-spacing: .5px; transition: all .12s; }
.chip.active { border-color: var(--blue); color: var(--blue); background: rgba(61,142,255,.08); }
.chip.c-red.active   { border-color: var(--red);   color: var(--red);   background: rgba(255,45,85,.08); }
.chip.c-amber.active { border-color: var(--amber); color: var(--amber); background: rgba(245,166,35,.08); }
.chip.c-green.active { border-color: var(--green); color: var(--green); background: rgba(0,212,122,.08); }
.sep { width: 1px; height: 16px; background: var(--b2); margin: 0 2px; }

/* ── Calendar ── */
.day-group { margin: 12px 20px; }
.day-hdr { font-size: .42rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; padding: 6px 0; border-bottom: 1px solid var(--b2); margin-bottom: 6px; display: flex; justify-content: space-between; font-family: var(--ff); }
.ev-row { background: var(--s2); border: 1px solid var(--b2); border-radius: 6px; margin-bottom: 4px; overflow: hidden; transition: border-color .12s; }
.ev-row:hover { border-color: var(--b3); }
.ev-hdr { display: grid; grid-template-columns: 68px 22px 1fr 60px 72px 72px 24px; gap: 8px; align-items: center; padding: 9px 12px; cursor: pointer; }
.ev-time { font-size: .42rem; color: var(--muted); font-family: var(--ff); font-variant-numeric: tabular-nums; }
.impact-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot-high { background: var(--red); box-shadow: 0 0 5px var(--red); }
.dot-med  { background: var(--amber); }
.dot-low  { background: var(--green); }
.ev-name { font-size: .5rem; font-weight: 600; font-family: var(--ff); color: var(--text); }
.ev-ccy { font-size: .4rem; color: var(--muted); background: var(--s3); padding: 2px 6px; border-radius: 3px; text-align: center; font-family: var(--ff); }
.ev-col { font-size: .46rem; font-weight: 600; text-align: right; font-family: var(--ff); }
.ev-col.pending { color: var(--muted); font-size: .4rem; }
.ev-chevron { font-size: .5rem; color: var(--muted); text-align: right; transition: transform .2s; }
.ev-row.open .ev-chevron { transform: rotate(180deg); }
.ev-hist { display: none; padding: 12px 14px; background: var(--s3); border-top: 1px solid var(--b2); }
.ev-row.open .ev-hist { display: block; }
.hist-label { font-size: .4rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; font-family: var(--ff); }
.hist-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 6px; }
.hist-item { background: var(--s2); border: 1px solid var(--b2); border-radius: 5px; padding: 8px 10px; }
.hi-date { font-size: .38rem; color: var(--muted); font-family: var(--ff); margin-bottom: 3px; }
.hi-val { font-size: .85rem; font-weight: 800; font-family: var(--fd); }
.hi-prev { font-size: .38rem; color: var(--muted); font-family: var(--ff); margin-top: 2px; }
.hi-chg-up { color: var(--green); } .hi-chg-dn { color: var(--red); }
.hist-loading { font-size: .44rem; color: var(--muted); font-family: var(--ff); animation: pulse 1.5s infinite; }
.hist-err { font-size: .44rem; color: var(--red); font-family: var(--ff); }

/* ── NEWS FEED ── */
.news-toolbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 20px; border-bottom: 1px solid var(--b2); flex-wrap: wrap; gap: 8px;
}
.news-stats { font-size: .4rem; color: var(--muted); font-family: var(--ff); }
.news-stats strong { color: var(--text); }
.refresh-btn { padding: 4px 14px; border-radius: 4px; border: 1px solid var(--b2); background: var(--s3); color: var(--t2); font-size: .4rem; font-family: var(--ff); cursor: pointer; transition: all .12s; }
.refresh-btn:hover { border-color: var(--blue); color: var(--blue); }
.news-grid { padding: 12px 20px; display: flex; flex-direction: column; gap: 8px; }
.news-card {
  background: var(--s2); border: 1px solid var(--b2); border-radius: 6px;
  padding: 14px; transition: border-color .12s;
  display: flex; gap: 12px; align-items: flex-start;
}
.news-card:hover { border-color: var(--b3); }
.news-card.impact-high { border-left: 3px solid var(--red); }
.news-card.impact-medium { border-left: 3px solid var(--amber); }
.news-card.impact-low { border-left: 3px solid var(--muted); }

/* Score badge */
.news-score {
  flex-shrink: 0; width: 36px; height: 36px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--fd); font-weight: 800; font-size: .7rem;
}
.score-high   { background: rgba(255,45,85,.12);  color: var(--red); }
.score-medium { background: rgba(245,166,35,.12); color: var(--amber); }
.score-low    { background: rgba(55,74,96,.3);    color: var(--muted); }

.news-body { flex: 1; min-width: 0; }
.news-source-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; flex-wrap: wrap; }
.news-source { font-size: .38rem; color: var(--muted); font-family: var(--ff); text-transform: uppercase; letter-spacing: .5px; }
.news-time   { font-size: .38rem; color: var(--muted); font-family: var(--ff); }

/* Category tags */
.news-tag { font-size: .35rem; padding: 1px 7px; border-radius: 2px; font-family: var(--ff); font-weight: 700; letter-spacing: .5px; border: 1px solid; }
.tag-gold     { color: #f5a623; border-color: rgba(245,166,35,.3); background: rgba(245,166,35,.06); }
.tag-fed      { color: var(--blue);   border-color: rgba(61,142,255,.3);  background: rgba(61,142,255,.06); }
.tag-oil      { color: var(--cyan);   border-color: rgba(0,196,245,.3);   background: rgba(0,196,245,.06); }
.tag-yields   { color: var(--purple); border-color: rgba(155,107,255,.3); background: rgba(155,107,255,.06); }
.tag-geo      { color: var(--red);    border-color: rgba(255,45,85,.3);   background: rgba(255,45,85,.06); }
.tag-trade    { color: var(--green);  border-color: rgba(0,212,122,.3);   background: rgba(0,212,122,.06); }
.tag-currency { color: #9b6bff;       border-color: rgba(155,107,255,.3); background: rgba(155,107,255,.06); }
.tag-macro    { color: var(--muted);  border-color: var(--b2);            background: transparent; }

.news-title { font-size: .52rem; font-weight: 600; font-family: var(--ff); color: var(--text); margin-bottom: 5px; line-height: 1.5; }
.news-title a { color: inherit; text-decoration: none; }
.news-title a:hover { color: var(--blue); }
.news-reason { font-size: .42rem; color: var(--t2); font-family: var(--ff); line-height: 1.6; }
.news-reason strong { color: var(--text); }

/* Market impact row */
.news-impact-row { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
.ni-pill { font-size: .36rem; padding: 2px 8px; border-radius: 3px; font-family: var(--ff); font-weight: 700; border: 1px solid; }
.ni-bull  { color: var(--green); border-color: rgba(0,212,122,.3);  background: rgba(0,212,122,.06); }
.ni-bear  { color: var(--red);   border-color: rgba(255,45,85,.3);  background: rgba(255,45,85,.06); }
.ni-neut  { color: var(--muted); border-color: var(--b2);           background: transparent; }
.ni-watch { color: var(--amber); border-color: rgba(245,166,35,.3); background: rgba(245,166,35,.06); }

.news-loading { padding: 32px 20px; text-align: center; font-size: .5rem; color: var(--muted); font-family: var(--ff); animation: pulse 1.5s infinite; }
.news-err { padding: 24px 20px; font-size: .48rem; color: var(--red); font-family: var(--ff); line-height: 1.8; }
.empty { padding: 32px 20px; text-align: center; font-size: .5rem; color: var(--muted); font-family: var(--ff); }

/* Source pills */
.src-pill { padding: 3px 10px; border-radius: 3px; border: 1px solid var(--b2); background: var(--s3); color: var(--muted); cursor: pointer; font-size: .4rem; font-family: var(--ff); transition: all .12s; }
.src-pill.active { border-color: var(--blue); color: var(--blue); background: rgba(61,142,255,.08); }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
</style>
</head>

<script>
const PAGE_ID = 'news';

// ── RSS Feed Sources ──────────────────────────────────────
// All fetched via rss2json.com free API (150 req/day, no key needed for low volume)
const RSS_SOURCES = [
  {
    name: 'Reuters',
    url: 'https://feeds.reuters.com/reuters/businessNews',
    fallback: 'https://feeds.reuters.com/reuters/topNews'
  },
  {
    name: 'BBC',
    url: 'https://feeds.bbci.co.uk/news/business/rss.xml'
  },
  {
    name: 'FT',
    url: 'https://www.ft.com/?format=rss'
  },
  {
    name: 'Bloomberg',
    url: 'https://feeds.bloomberg.com/markets/news.rss'
  },
  {
    name: 'Reuters Markets',
    url: 'https://feeds.reuters.com/reuters/marketsNews'
  },
  {
    name: 'Investing.com Gold',
    url: 'https://www.investing.com/rss/news_25.rss'
  }
];

const RSS2JSON = 'https://api.rss2json.com/v1/api.json?rss_url=';

// ── Financial impact scoring system ──────────────────────
// Each keyword group has a score and market tag
const IMPACT_RULES = [
  // CRITICAL — Gold direct
  { kws:['gold price','xauusd','gold futures','gold rally','gold drops','gold surge','gold falls','spot gold'], score:10, tag:'GOLD', goldEffect:'watch' },
  // CRITICAL — Fed
  { kws:['federal reserve','fed rate','fomc','jerome powell','rate hike','rate cut','interest rate decision','monetary policy','fed funds','quantitative','balance sheet reduction'], score:10, tag:'FED', goldEffect:'watch' },
  // CRITICAL — Inflation
  { kws:['cpi data','inflation data','inflation report','consumer price','core inflation','pce deflator','ppi report','producer price'], score:9, tag:'FED', goldEffect:'bull' },
  // HIGH — Yields
  { kws:['treasury yield','bond yield','10-year yield','yield curve','t-bill','us bonds','bond market','real yield','tips yield'], score:8, tag:'YIELDS', goldEffect:'bear' },
  // HIGH — Oil / Energy
  { kws:['oil price','crude oil','brent','wti','opec','opec+','energy supply','oil supply','oil demand','iran sanctions oil','pipeline','natural gas price'], score:8, tag:'OIL', goldEffect:'watch' },
  // HIGH — Dollar
  { kws:['dollar index','dxy','dollar strength','dollar weakness','usd','dollar rally','dollar falls','de-dollarization','dollar dominance','reserve currency'], score:8, tag:'CURRENCY', goldEffect:'bear' },
  // HIGH — Trade wars
  { kws:['tariff','trade war','trade dispute','sanctions','export controls','import duty','trade deficit','wto','trade deal','semiconductor ban','chip restriction'], score:8, tag:'TRADE', goldEffect:'bull' },
  // HIGH — Geopolitical
  { kws:['war','conflict','military','nuclear','missile','iran','russia','ukraine','nato','middle east','israel','hamas','taiwan strait','south china sea','brics','geopolit'], score:7, tag:'GEO', goldEffect:'bull' },
  // HIGH — Central banks
  { kws:['central bank','rbi','ecb','boj','pboc','bank of england','reserve bank','rate decision','monetary stimulus','gold reserves','foreign reserves'], score:7, tag:'FED', goldEffect:'watch' },
  // MEDIUM — Jobs / Economy
  { kws:['nonfarm payroll','unemployment','jobs report','gdp growth','recession','economic growth','economic slowdown','labor market','payrolls'], score:6, tag:'MACRO', goldEffect:'watch' },
  // MEDIUM — Market stress
  { kws:['stock market crash','market selloff','vix','risk off','safe haven','flight to safety','bank crisis','financial crisis','credit crunch','default'], score:6, tag:'MACRO', goldEffect:'bull' },
  // LOW but relevant
  { kws:['inflation expectations','breakeven rate','commodity','silver','copper','palladium','platinum','precious metals'], score:4, tag:'GOLD', goldEffect:'watch' },
];

// Minimum score to show in filtered view
const MIN_SCORE_SHOW = 4;
const MIN_SCORE_HIGH = 8;
const MIN_SCORE_MEDIUM = 5;

// ── State ─────────────────────────────────────────────────
let allArticles = [];
let newsLoaded = false;
let newsFilters = { impact: ['high','medium','low'], cat: 'ALL', source: 'ALL' };
let activeTab = 'week';
let ccyFilter = 'ALL';
let impactFilter = ['HIGH','MED','LOW'];
let histCache = {};

// ── Tab switching ─────────────────────────────────────────
function switchTab(tab, el) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');

  const cal = document.getElementById('calContent');
  const news = document.getElementById('newsContent');
  const calF = document.getElementById('calFilters');
  const newsF = document.getElementById('newsFilters');

  if (tab === 'news') {
    cal.style.display = 'none'; news.style.display = 'block';
    calF.style.display = 'none'; newsF.style.display = 'flex';
    if (!newsLoaded) loadNews();
  } else {
    cal.style.display = 'block'; news.style.display = 'none';
    calF.style.display = 'flex'; newsF.style.display = 'none';
    renderCalendar();
  }
}

// ── RSS News Loader ───────────────────────────────────────
async function loadNews() {
  const container = document.getElementById('newsContent');
  container.innerHTML = `
    <div class="news-toolbar">
      <div class="news-stats">Loading feeds…</div>
      <button class="refresh-btn" onclick="refreshNews()">⟳ REFRESH</button>
    </div>
    <div class="news-loading">Fetching Reuters, BBC, FT, Bloomberg…</div>`;

  const results = [];

  for (const src of RSS_SOURCES) {
    try {
      const url = RSS2JSON + encodeURIComponent(src.url) + '&count=20';
      const res = await fetch(url, { signal: AbortSignal.timeout(8000) });
      const data = await res.json();

      if (data.status === 'ok' && data.items) {
        data.items.forEach(item => {
          const scored = scoreArticle(item, src.name);
          if (scored.totalScore >= MIN_SCORE_SHOW) {
            results.push(scored);
          }
        });
      }
    } catch(e) {
      console.warn(`[RSS] ${src.name} failed:`, e.message);
      // Try fallback if available
      if (src.fallback) {
        try {
          const url2 = RSS2JSON + encodeURIComponent(src.fallback) + '&count=20';
          const res2 = await fetch(url2, { signal: AbortSignal.timeout(8000) });
          const data2 = await res2.json();
          if (data2.status === 'ok' && data2.items) {
            data2.items.forEach(item => {
              const scored = scoreArticle(item, src.name);
              if (scored.totalScore >= MIN_SCORE_SHOW) results.push(scored);
            });
          }
        } catch(e2) { /* silent */ }
      }
    }
  }

  // Deduplicate by title similarity, sort by score then date
  const deduped = deduplicateArticles(results);
  deduped.sort((a, b) => b.totalScore - a.totalScore || new Date(b.pubDate) - new Date(a.pubDate));

  allArticles = deduped;
  newsLoaded = true;
  renderNews();
}

function refreshNews() { newsLoaded = false; loadNews(); }

// ── Score an article ──────────────────────────────────────
function scoreArticle(item, sourceName) {
  const title = (item.title || '').toLowerCase();
  const desc  = (item.description || item.content || '').toLowerCase().slice(0, 500);
  const text  = title + ' ' + desc;

  let totalScore = 0;
  let tags = new Set();
  let goldEffects = new Set();
  let matchedRules = [];

  IMPACT_RULES.forEach(rule => {
    const hit = rule.kws.some(kw => text.includes(kw));
    if (hit) {
      totalScore += rule.score;
      tags.add(rule.tag);
      goldEffects.add(rule.goldEffect);
      matchedRules.push({ tag: rule.tag, score: rule.score });
    }
  });

  // Impact level
  let impact = 'low';
  if (totalScore >= MIN_SCORE_HIGH) impact = 'high';
  else if (totalScore >= MIN_SCORE_MEDIUM) impact = 'medium';

  // Primary tag — highest scoring match
  matchedRules.sort((a,b) => b.score - a.score);
  const primaryTag = matchedRules[0]?.tag || 'MACRO';

  // Generate reason
  const reason = generateReason(title, [...tags], totalScore, goldEffects);

  // Gold effect consensus
  let goldEffect = 'watch';
  if (goldEffects.has('bull') && !goldEffects.has('bear')) goldEffect = 'bull';
  else if (goldEffects.has('bear') && !goldEffects.has('bull')) goldEffect = 'bear';

  return {
    title: item.title || 'No title',
    link: item.link || item.url || '#',
    pubDate: item.pubDate || item.published || new Date().toISOString(),
    source: sourceName,
    totalScore,
    impact,
    tags: [...tags].slice(0, 3),
    primaryTag,
    goldEffect,
    reason,
    description: (item.description || '').replace(/<[^>]*>/g, '').slice(0, 150)
  };
}

function generateReason(title, tags, score, goldEffects) {
  const t = title.toLowerCase();
  const parts = [];

  if (tags.includes('GOLD')) parts.push('Direct Gold price impact');
  if (tags.includes('FED')) parts.push('Fed policy affects real yields → Gold inverse relationship');
  if (tags.includes('YIELDS')) parts.push('Yield movement = primary Gold driver (inverse)');
  if (tags.includes('OIL')) parts.push('Oil → inflation expectations → Gold demand');
  if (tags.includes('GEO')) parts.push('Geopolitical risk → safe haven Gold demand');
  if (tags.includes('TRADE')) parts.push('Trade war → dollar uncertainty → Gold hedge');
  if (tags.includes('CURRENCY')) parts.push('Dollar strength/weakness directly moves Gold');
  if (tags.includes('MACRO')) parts.push('Macro data affects rate expectations → Gold');

  if (score >= 15) parts.unshift('⚡ VERY HIGH IMPACT');
  else if (score >= 10) parts.unshift('HIGH IMPACT');

  return parts.slice(0, 2).join(' · ') || 'Monitor for market implications';
}

function deduplicateArticles(articles) {
  const seen = new Set();
  return articles.filter(a => {
    const key = a.title.toLowerCase().slice(0, 60).replace(/\s+/g, ' ');
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

// ── Render news ───────────────────────────────────────────
function renderNews() {
  const container = document.getElementById('newsContent');

  let filtered = allArticles;
  if (!newsFilters.impact.includes('high'))   filtered = filtered.filter(a => a.impact !== 'high');
  if (!newsFilters.impact.includes('medium')) filtered = filtered.filter(a => a.impact !== 'medium');
  if (!newsFilters.impact.includes('low'))    filtered = filtered.filter(a => a.impact === 'high' || a.impact === 'medium' ? false : !newsFilters.impact.includes('low'));
  if (newsFilters.cat !== 'ALL') filtered = filtered.filter(a => a.tags.includes(newsFilters.cat) || a.primaryTag === newsFilters.cat);
  if (newsFilters.source !== 'ALL') filtered = filtered.filter(a => a.source === newsFilters.source);

  const highCount   = allArticles.filter(a => a.impact === 'high').length;
  const medCount    = allArticles.filter(a => a.impact === 'medium').length;
  const totalLoaded = allArticles.length;

  if (!filtered.length) {
    container.innerHTML = `
      <div class="news-toolbar">
        <div class="news-stats">Loaded <strong>${totalLoaded}</strong> articles · <strong style="color:var(--red)">${highCount}</strong> high impact · <strong style="color:var(--amber)">${medCount}</strong> medium</div>
        <button class="refresh-btn" onclick="refreshNews()">⟳ REFRESH</button>
      </div>
      <div class="empty">No articles match current filters. Try adjusting the impact or category filter.</div>`;
    return;
  }

  container.innerHTML = `
    <div class="news-toolbar">
      <div class="news-stats">
        <strong>${filtered.length}</strong> articles shown · 
        <strong style="color:var(--red)">${highCount}</strong> high impact · 
        <strong style="color:var(--amber)">${medCount}</strong> medium · 
        Total loaded: ${totalLoaded}
      </div>
      <button class="refresh-btn" onclick="refreshNews()">⟳ REFRESH</button>
    </div>
    <div class="news-grid">
      ${filtered.map(a => buildArticleCard(a)).join('')}
    </div>`;
}

function buildArticleCard(a) {
  const scoreClass = a.impact === 'high' ? 'score-high' : a.impact === 'medium' ? 'score-medium' : 'score-low';
  const tagHtml = a.tags.map(t => `<span class="news-tag tag-${t.toLowerCase()}">${t}</span>`).join('');
  const goldPill = a.goldEffect === 'bull'
    ? '<span class="ni-pill ni-bull">GOLD ↑ BULLISH</span>'
    : a.goldEffect === 'bear'
    ? '<span class="ni-pill ni-bear">GOLD ↓ BEARISH</span>'
    : '<span class="ni-pill ni-watch">GOLD ⚡ WATCH</span>';

  const pubDate = a.pubDate ? new Date(a.pubDate) : null;
  const timeStr = pubDate ? timeAgo(pubDate) : '—';

  return `<div class="news-card impact-${a.impact}">
    <div class="news-score ${scoreClass}">${a.totalScore}</div>
    <div class="news-body">
      <div class="news-source-row">
        <span class="news-source">${esc(a.source)}</span>
        <span class="news-time">${timeStr}</span>
        ${tagHtml}
      </div>
      <div class="news-title"><a href="${escUrl(a.link)}" target="_blank" rel="noopener">${esc(a.title)}</a></div>
      <div class="news-reason">${esc(a.reason)}</div>
      <div class="news-impact-row">
        ${goldPill}
        <span class="ni-pill ni-neut">${esc(a.source)}</span>
      </div>
    </div>
  </div>`;
}

// ── News filter handlers ──────────────────────────────────
function toggleNewsFilter(level, btn) {
  const idx = newsFilters.impact.indexOf(level);
  if (idx > -1) newsFilters.impact.splice(idx, 1);
  else newsFilters.impact.push(level);
  btn.classList.toggle('active');
  if (newsLoaded) renderNews();
}

function filterNewsCat(cat, btn) {
  newsFilters.cat = cat;
  document.querySelectorAll('#newsFilters .chip').forEach(b => {
    if (['ALL','GOLD','FED','OIL','YIELDS','GEO','TRADE'].includes(b.textContent)) b.classList.remove('active');
  });
  btn.classList.add('active');
  if (newsLoaded) renderNews();
}

function filterNewsSource(source, btn) {
  newsFilters.source = source;
  document.querySelectorAll('.src-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (newsLoaded) renderNews();
}

// ── Calendar (unchanged logic) ────────────────────────────
function nowIST() {
  return new Date(new Date().toLocaleString('en-US', { timeZone:'Asia/Kolkata' }));
}
function getWeekRange(offset) {
  const now = nowIST();
  const day = now.getDay();
  const mon = new Date(now); mon.setDate(now.getDate() - (day===0?6:day-1) + offset*7); mon.setHours(0,0,0,0);
  const fri = new Date(mon); fri.setDate(mon.getDate()+6); fri.setHours(23,59,59,999);
  return { start:mon, end:fri };
}

const CAL_EVENTS = [
  { name:'CPI y/y',      currency:'USD', impact:'HIGH', series:'CPIAUCSL', dayOfMonth:10, hour:8,  min:30 },
  { name:'Core CPI y/y', currency:'USD', impact:'HIGH', series:'CPILFESL', dayOfMonth:10, hour:8,  min:30 },
  { name:'NFP',          currency:'USD', impact:'HIGH', series:'PAYEMS',   dayOfMonth:4,  hour:8,  min:30 },
  { name:'Unemployment', currency:'USD', impact:'HIGH', series:'UNRATE',   dayOfMonth:4,  hour:8,  min:30 },
  { name:'GDP QoQ',      currency:'USD', impact:'HIGH', series:'A191RL1Q225SBEA', dayOfMonth:28, hour:8, min:30 },
  { name:'Fed Funds Rate',currency:'USD',impact:'HIGH', series:'FEDFUNDS', dayOfMonth:1,  hour:14, min:0  },
  { name:'FOMC Minutes', currency:'USD', impact:'HIGH', series:'',         dayOfMonth:8,  hour:14, min:0  },
  { name:'PPI m/m',      currency:'USD', impact:'MED',  series:'',         dayOfMonth:11, hour:8,  min:30 },
  { name:'Retail Sales', currency:'USD', impact:'MED',  series:'',         dayOfMonth:16, hour:8,  min:30 },
  { name:'ISM Mfg PMI',  currency:'USD', impact:'MED',  series:'',         dayOfMonth:1,  hour:10, min:0  },
  { name:'Consumer Confidence',currency:'USD',impact:'MED',series:'',      dayOfMonth:25, hour:10, min:0  },
  { name:'ECB Rate Decision',currency:'EUR',impact:'HIGH',series:'',       dayOfMonth:11, hour:13, min:15 },
  { name:'UK CPI',       currency:'GBP', impact:'HIGH', series:'',         dayOfMonth:15, hour:7,  min:0  },
  { name:'BoE Rate',     currency:'GBP', impact:'HIGH', series:'',         dayOfMonth:8,  hour:12, min:0  },
];

function buildEvents(start, end) {
  const events = [];
  let cur = new Date(start);
  while (cur <= end) {
    const y = cur.getFullYear(), m = cur.getMonth(), d = cur.getDate();
    CAL_EVENTS.forEach((ev, i) => {
      const evDate = new Date(y, m, ev.dayOfMonth, ev.hour, ev.min, 0);
      if (evDate >= start && evDate <= end) {
        const key = `${ev.name.replace(/\s/g,'_')}_${y}_${m}`;
        events.push({
          ...ev,
          date: evDate,
          dateStr: evDate.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' }),
          timeStr: evDate.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', timeZone:'Asia/Kolkata' }) + ' IST',
          key
        });
      }
    });
    cur.setDate(cur.getDate() + 1);
  }
  return events.sort((a,b) => a.date - b.date);
}

function renderCalendar() {
  let events = [];
  if (activeTab==='week')   { const r=getWeekRange(0); events=buildEvents(r.start,r.end); }
  else if (activeTab==='next') { const r=getWeekRange(1); events=buildEvents(r.start,r.end); }
  else { const r1=getWeekRange(2),r2=getWeekRange(9); events=buildEvents(r1.start,r2.end); }

  events = events.filter(e => {
    const cok = ccyFilter==='ALL'||e.currency===ccyFilter;
    const iok = impactFilter.includes(e.impact);
    return cok && iok;
  });

  const container = document.getElementById('calContent');
  if (!events.length) { container.innerHTML='<div class="empty">No events match current filters.</div>'; return; }

  const byDay = {};
  events.forEach(e => { if(!byDay[e.dateStr]) byDay[e.dateStr]=[]; byDay[e.dateStr].push(e); });

  container.innerHTML = Object.entries(byDay).map(([day,dayEvs]) => `
    <div class="day-group">
      <div class="day-hdr">
        <span>${day}</span>
        <span>${dayEvs.filter(e=>e.impact==='HIGH').length} HIGH IMPACT</span>
      </div>
      ${dayEvs.map(renderEventRow).join('')}
    </div>
  `).join('');
}

function renderEventRow(e) {
  const dotClass = {HIGH:'dot-high',MED:'dot-med',LOW:'dot-low'}[e.impact]||'dot-low';
  return `
    <div class="ev-row" id="ev-${e.key}" onclick="toggleEvent('${e.key}','${e.series||''}','${e.name}')">
      <div class="ev-hdr">
        <div class="ev-time">${e.timeStr}</div>
        <div class="impact-dot ${dotClass}"></div>
        <div class="ev-name">${e.name}</div>
        <div class="ev-ccy">${e.currency}</div>
        <div class="ev-col pending">—</div>
        <div class="ev-col pending">Pending</div>
        <div class="ev-chevron">▾</div>
      </div>
      <div class="ev-hist" id="hist-${e.key}">
        <div class="hist-label">Previous Releases ${e.series?'(FRED Historical Data)':'(No FRED series linked)'}</div>
        <div id="histInner-${e.key}">${e.series?'<div class="hist-loading">Loading FRED history…</div>':'<div class="hist-err">No FRED series available. Check macro page for historical data.</div>'}</div>
      </div>
    </div>`;
}

async function toggleEvent(key, series, name) {
  const row = document.getElementById(`ev-${key}`);
  const isOpen = row.classList.contains('open');
  document.querySelectorAll('.ev-row.open').forEach(r => r.classList.remove('open'));
  if (isOpen) return;
  row.classList.add('open');
  if (!series) return;
  const inner = document.getElementById(`histInner-${key}`);
  if (histCache[series]) { renderHistGrid(inner, histCache[series], series); return; }
  inner.innerHTML = '<div class="hist-loading">Fetching FRED data…</div>';
  try {
    const res = await API.fred(series);
    const obs = (res.observations||[]).filter(o=>o.value!=='.'&&o.value!=='').sort((a,b)=>b.date.localeCompare(a.date)).slice(0,12);
    histCache[series] = obs;
    renderHistGrid(inner, obs, series);
  } catch(e) { inner.innerHTML=`<div class="hist-err">⚠ ${e.message}</div>`; }
}

function renderHistGrid(container, obs, series) {
  if (!obs.length) { container.innerHTML='<div class="hist-err">No data returned.</div>'; return; }
  const isYoY = ['CPIAUCSL','CPILFESL'].includes(series);
  const isMoM = series==='PAYEMS';
  const sorted = [...obs].sort((a,b)=>a.date.localeCompare(b.date));
  const revObs = [...sorted].reverse();
  container.innerHTML = `<div class="hist-grid">`+revObs.map((o,i)=>{
    const raw=parseFloat(o.value),prev=revObs[i+1]?parseFloat(revObs[i+1].value):null;
    let display,unit='';
    if(isYoY){const idx=sorted.findIndex(s=>s.date===o.date),p12=sorted[idx-12];display=p12?+((raw-parseFloat(p12.value))/parseFloat(p12.value)*100).toFixed(2):raw;unit='%';}
    else if(isMoM){display=prev!==null?+(raw-prev).toFixed(1):raw;unit='K';}
    else{display=raw;}
    const chg=display!==null&&prev!==null?display-prev:null;
    const cls=chg>0?'hi-chg-up':chg<0?'hi-chg-dn':'';
    return `<div class="hist-item">
      <div class="hi-date">${o.date}</div>
      <div class="hi-val ${display>0?'hi-chg-up':display<0?'hi-chg-dn':''}">${display!=null?display.toFixed(2)+unit:'—'}</div>
      <div class="hi-prev ${cls}">Prev: ${prev!=null?prev.toFixed(2)+unit:'—'}</div>
    </div>`;
  }).join('')+'</div>';
}

// ── Calendar filter handlers ──────────────────────────────
function setCcy(ccy, el) {
  ccyFilter=ccy;
  document.querySelectorAll('#calFilters .chip').forEach(c=>{if(['ALL','USD','EUR','GBP'].includes(c.textContent))c.classList.remove('active');});
  el.classList.add('active'); renderCalendar();
}
function toggleImpact(level, el) {
  if(impactFilter.includes(level)){impactFilter=impactFilter.filter(i=>i!==level);el.classList.remove('active');}
  else{impactFilter.push(level);el.classList.add('active');}
  renderCalendar();
}

// ── Countdown ─────────────────────────────────────────────
function updateCountdown() {
  const now=nowIST(),r1=getWeekRange(0),r2=getWeekRange(4);
  const evs=buildEvents(r1.start,r2.end).filter(e=>e.impact==='HIGH'&&e.date>now);
  if(!evs.length){document.getElementById('cdTimer').textContent='—';return;}
  const next=evs[0];
  document.getElementById('cdEvent').textContent=next.name;
  const diff=next.date-now;
  const h=Math.floor(diff/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);
  document.getElementById('cdTimer').textContent=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

// ── Helpers ───────────────────────────────────────────────
function esc(str) { return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escUrl(url) { try { const u=new URL(url); return (u.protocol==='http:'||u.protocol==='https:')?url:'#'; } catch{ return '#'; } }
function timeAgo(d) {
  const s=(Date.now()-d)/1000;
  if(s<60) return 'just now';
  if(s<3600) return `${Math.floor(s/60)}m ago`;
  if(s<86400) return `${Math.floor(s/3600)}h ago`;
  return `${Math.floor(s/86400)}d ago`;
}
